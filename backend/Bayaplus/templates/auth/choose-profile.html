<!DOCTYPE html>
<html>
<head>
    <title>Choose Profile - BayaPlus</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        .container { background: #f9f9f9; padding: 30px; border-radius: 10px; }
        h2 { color: #4CAF50; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn:hover { background: #45a049; }
        .messages { list-style: none; padding: 0; }
        .messages li { padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .info { background: #e3f2fd; color: #0d47a1; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎵 Choose Your Profile</h2>
        <p>Welcome, <strong>{{ request.user.fullname }}</strong>! Please choose your role:</p>
        
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="role">Select Role:</label>
                <select name="role" id="role" required>
                    <option value="">-- Select Role --</option>
                    <option value="Artist">Artist</option>
                    <option value="Fan">Fan</option>
                </select>
            </div>
            
            <div class="form-group" id="artist-name-group" style="display: none;">
                <label for="artist_name">Artist Name:</label>
                <input type="text" name="artist_name" id="artist_name" placeholder="Enter your artist name">
                <small style="color: #666;">This name will be visible to fans</small>
            </div>
            
            <button type="submit" class="btn">Create Profile</button>
        </form>
        
        <p style="margin-top: 20px;">
            <a href="/bayaplus/logout/">Logout</a>
        </p>
    </div>
    
    <script>
        // Show/hide artist name field based on role selection
        document.getElementById('role').addEventListener('change', function() {
            var artistNameGroup = document.getElementById('artist-name-group');
            if (this.value === 'Artist') {
                artistNameGroup.style.display = 'block';
            } else {
                artistNameGroup.style.display = 'none';
            }
        });
    </script>
</body>
</html>
