<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Profile</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:#fff;
            padding:30px;
            width:350px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-top:15px;
            font-weight:bold;
        }

        select,input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .messages{
            margin-bottom:15px;
        }

        .success{
            color:green;
        }

        .error{
            color:red;
        }

        #artistField{
            display:none;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>Choose Your Profile</h2>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p class="{{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Profile Type</label>
        <select name="role" id="role" onchange="toggleArtistField()" required>
            <option value="">Select</option>
            <option value="Artist">Artist</option>
            <option value="Fan">Fan</option>
        </select>

        <div id="artistField">
            <label>Artist Name</label>
            <input
                type="text"
                name="artist_name"
                placeholder="Enter your artist name">
        </div>

        <button type="submit">Continue</button>

    </form>

</div>

<script>
function toggleArtistField() {
    const role = document.getElementById("role").value;
    const artistField = document.getElementById("artistField");

    if(role === "Artist"){
        artistField.style.display = "block";
    }else{
        artistField.style.display = "none";
    }
}
</script>

</body>
</html>
